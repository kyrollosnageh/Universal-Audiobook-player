name: libretto
description: Universal Audiobook Player — connect to Emby, Jellyfin, Audiobookshelf, and Plex.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Audio Engine
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  audio_session: ^0.1.18

  # Networking
  dio: ^5.4.0

  # Local Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Image Caching
  cached_network_image: ^3.3.1

  # Connectivity
  connectivity_plus: ^5.0.2

  # Local Auth (biometric)
  local_auth: ^2.1.8

  # Firebase Crashlytics
  firebase_core: ^2.24.2
  firebase_crashlytics: ^3.4.9

  # Utilities
  uuid: ^4.2.2
  path_provider: ^2.1.2
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
