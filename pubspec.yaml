name: libretto
description: Universal Audiobook Player — connect to Emby, Jellyfin, Audiobookshelf, and Plex.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Audio Engine
  just_audio: ^0.10.5
  audio_service: ^0.18.12
  audio_session: ^0.2.3

  # Networking
  dio: ^5.4.0

  # Local Database
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0+eol

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Image Caching
  cached_network_image: ^3.3.1

  # Connectivity
  connectivity_plus: ^7.0.0

  # Local Auth (biometric)
  local_auth: ^3.0.1

  # Firebase Crashlytics
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8

  # Utilities
  uuid: ^4.2.2
  path_provider: ^2.1.2
  intl: ^0.20.2
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  drift_dev: ^2.31.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  mockito: ^5.6.3
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
