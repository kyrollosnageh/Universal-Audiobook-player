name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: 'Performance'
    labels:
      - 'performance'
  - title: 'Dependencies'
    labels:
      - 'dependencies'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch

template: |
  ## What's Changed

  $CHANGES

  ---
  ### Downloads
  | Platform | File |
  |----------|------|
  | Android  | `libretto-$RESOLVED_VERSION.apk` |
  | iOS      | `libretto-$RESOLVED_VERSION.ipa` (sideload / TestFlight) |
