name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Auto-label by file path ─────────────────────────────────
  label-by-path:
    name: Label by Path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  # ── Label by PR size ────────────────────────────────────────
  label-by-size:
    name: Label by Size
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@0b7f116f59d1830881bc1cc88be32b005ab09ffa # v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 10
          s_label: 'size/S'
          s_max_size: 50
          m_label: 'size/M'
          m_max_size: 200
          l_label: 'size/L'
          l_max_size: 500
          xl_label: 'size/XL'
          fail_if_xl: false
