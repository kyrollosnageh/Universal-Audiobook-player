name: Release & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: "17"

jobs:
  # ── Draft / publish GitHub Release ───────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag_name: ${{ steps.release-drafter.outputs.tag_name }}
    steps:
      - id: release-drafter
        uses: release-drafter/release-drafter@67e173cadb2fbd3de94f4a861e0c48c913b462ae # v6
        with:
          publish: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Build & upload Android APK ────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push'
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate Android platform files
        run: |
          flutter create --org com.kyronageh --platforms android .
          flutter pub get

      - name: Apply Android configuration
        run: bash android_config/apply_config.sh

      - name: Setup release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bash android_config/setup_signing.sh

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Rename APK with version
        run: |
          TAG="${{ needs.release.outputs.tag_name }}"
          VERSION="${TAG#v}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/libretto-${VERSION}-universal.apk
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            [ -f "$apk" ] || continue
            arch=$(basename "$apk" | sed 's/app-//' | sed 's/-release\.apk//')
            mv "$apk" "build/app/outputs/flutter-apk/libretto-${VERSION}-${arch}.apk"
          done

      - name: Upload APK to GitHub Release
        run: |
          TAG="${{ needs.release.outputs.tag_name }}"
          for apk in build/app/outputs/flutter-apk/libretto-*.apk; do
            [ -f "$apk" ] || continue
            gh release upload "$TAG" "$apk" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/libretto-*.apk
          retention-days: 30

  # ── Build & upload iOS IPA ────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: release
    if: github.event_name == 'push'
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Generate iOS platform files
        run: |
          flutter create --org com.kyronageh --platforms ios .
          flutter pub get

      - name: Apply iOS configuration
        run: bash ios_config/apply_config.sh

      - name: Setup iOS code signing
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: bash ios_config/setup_signing.sh

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (signed)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: flutter build ios --release

      - name: Build iOS (unsigned fallback)
        if: env.IOS_CERTIFICATE_BASE64 == ''
        run: flutter build ios --no-codesign --release

      - name: Package IPA
        run: |
          TAG="${{ needs.release.outputs.tag_name }}"
          VERSION="${TAG#v}"
          APP_PATH=$(find build/ios/Release-iphoneos -name "*.app" | head -1)

          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "libretto-${VERSION}.ipa" Payload/
        env:
          TAG: ${{ needs.release.outputs.tag_name }}

      - name: Upload IPA to GitHub Release
        run: |
          TAG="${{ needs.release.outputs.tag_name }}"
          VERSION="${TAG#v}"
          gh release upload "$TAG" \
            "build/ios/ipa/libretto-${VERSION}.ipa" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: build/ios/ipa/libretto-*.ipa
          retention-days: 30
