name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.24.0"
  JAVA_VERSION: "17"

jobs:
  # ── Stage 1: Static Analysis ─────────────────────────────────
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Run analyzer
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Check for hardcoded secrets
        run: |
          # Scan for potential secrets in Dart source files
          if grep -rn --include="*.dart" -E '(password|secret|api_key|token)\s*[:=]\s*["\x27][^"\x27]{8,}' lib/ ; then
            echo "::error::Potential hardcoded secrets detected in source code"
            exit 1
          fi
          echo "No hardcoded secrets found."

  # ── Stage 2: Unit & Widget Tests ─────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit & widget tests with coverage
        run: flutter test --coverage --reporter=github

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          file: coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Enforce coverage threshold on services/
        run: |
          if [ -f coverage/lcov.info ]; then
            # Extract coverage for services/ directory
            TOTAL_LINES=$(grep -A1 "SF:lib/services/" coverage/lcov.info | grep "^LF:" | awk -F: '{sum+=$2} END {print sum}')
            HIT_LINES=$(grep -A2 "SF:lib/services/" coverage/lcov.info | grep "^LH:" | awk -F: '{sum+=$2} END {print sum}')

            if [ -n "$TOTAL_LINES" ] && [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$((HIT_LINES * 100 / TOTAL_LINES))
              echo "Services coverage: ${COVERAGE}%"
              if [ "$COVERAGE" -lt 80 ]; then
                echo "::error::Services coverage ${COVERAGE}% is below the 80% threshold"
                exit 1
              fi
            else
              echo "::warning::Could not calculate services coverage — no data found"
            fi
          else
            echo "::warning::No coverage file found"
          fi

  # ── Stage 3: Integration Tests (main branch only) ────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test test/integration/

  # ── Stage 4: Build Android ───────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write  # for artifact upload
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  # ── Stage 5: Build iOS ───────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug

  # ── Stage 6: Publish dry-run (release readiness) ─────────────
  publish-check:
    name: Publish Dry-Run
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build-android]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify pubspec validity
        run: |
          dart pub publish --dry-run 2>&1 || true
          echo "Publish dry-run complete — verify output above."
