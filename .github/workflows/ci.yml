name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"

jobs:
  # ── Stage 1: Static Analysis ─────────────────────────────────
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (Drift, Freezed, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Auto-format code
        run: dart format .

      - name: Check for formatting changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::notice::Auto-formatted files:"
            git diff --name-only
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format for Dart $(dart --version 2>&1 | grep -oP '\d+\.\d+\.\d+')"
            git push
            echo "::warning::Pushed formatting fixes. Workflow will re-run."
            exit 1
          fi
          echo "All files correctly formatted."

      - name: Run analyzer
        run: dart analyze --fatal-warnings

      - name: Check for hardcoded secrets
        run: |
          # Scan for potential secrets in Dart source files
          if grep -rn --include="*.dart" -E '(password|secret|api_key|token)\s*[:=]\s*["\x27][^"\x27]{8,}' lib/ ; then
            echo "::error::Potential hardcoded secrets detected in source code"
            exit 1
          fi
          echo "No hardcoded secrets found."

  # ── Stage 2: Unit & Widget Tests ─────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (Drift, Freezed, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit & widget tests with coverage
        run: flutter test --coverage --reporter=github

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          file: coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Enforce coverage threshold on services/
        run: |
          if [ -f coverage/lcov.info ]; then
            # Extract coverage for services/ directory
            TOTAL_LINES=$(grep -A1 "SF:lib/services/" coverage/lcov.info | grep "^LF:" | awk -F: '{sum+=$2} END {print sum}')
            HIT_LINES=$(grep -A2 "SF:lib/services/" coverage/lcov.info | grep "^LH:" | awk -F: '{sum+=$2} END {print sum}')

            if [ -n "$TOTAL_LINES" ] && [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$((HIT_LINES * 100 / TOTAL_LINES))
              echo "Services coverage: ${COVERAGE}%"
              if [ "$COVERAGE" -lt 80 ]; then
                echo "::error::Services coverage ${COVERAGE}% is below the 80% threshold"
                exit 1
              fi
            else
              echo "::warning::Could not calculate services coverage — no data found"
            fi
          else
            echo "::warning::No coverage file found"
          fi

  # ── Stage 3: Integration Tests (main branch only) ────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test test/integration/

  # ── Stage 4: Build Android ───────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write  # for artifact upload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: |
          flutter create --org com.kyronageh --platforms android .
          flutter pub get

      - name: Apply Android configuration
        run: bash android_config/apply_config.sh

      - name: Setup release signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/libretto-release.jks
          cat > android/key.properties << PROPS
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=libretto-release.jks
          PROPS

      - name: Configure release signing in build.gradle
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          cd android/app
          # Read key.properties in build.gradle
          sed -i '/android {/i \
          def keystoreProperties = new Properties()\n\
          def keystorePropertiesFile = rootProject.file("key.properties")\n\
          if (keystorePropertiesFile.exists()) {\n\
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n\
          }' build.gradle

          # Add signingConfigs block before buildTypes
          sed -i '/buildTypes {/i \
          signingConfigs {\n\
              release {\n\
                  keyAlias keystoreProperties["keyAlias"]\n\
                  keyPassword keystoreProperties["keyPassword"]\n\
                  storeFile file(keystoreProperties["storeFile"])\n\
                  storePassword keystoreProperties["storePassword"]\n\
              }\n\
          }' build.gradle

          # Update release buildType to use release signing
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK (signed)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: flutter build apk --release

      - name: Build debug APK (fallback)
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 14

  # ── Stage 5: Build iOS ───────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: test
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Generate iOS platform files
        run: |
          flutter create --org com.kyronageh --platforms ios .
          flutter pub get

      - name: Set iOS deployment target
        env:
          IOS_MIN_VERSION: "16.0"
        run: |
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = ${IOS_MIN_VERSION}/g" ios/Runner.xcodeproj/project.pbxproj
          grep -q "^platform :ios" ios/Podfile || sed -i '' "1i\\
          platform :ios, '${IOS_MIN_VERSION}'
          " ios/Podfile

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug

  # ── Stage 6: Publish dry-run (release readiness) ─────────────
  publish-check:
    name: Publish Dry-Run
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build-android]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify pubspec validity
        run: |
          dart pub publish --dry-run 2>&1 || true
          echo "Publish dry-run complete — verify output above."
