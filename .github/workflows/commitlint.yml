name: Commit Lint

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate conventional commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Check all commits in this PR use conventional format
          COMMITS=$(git log --format="%s" "origin/$BASE_REF"..HEAD)
          FAILED=0

          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|deps|merge)(\(.+\))?(!)?: .{1,}"
          MERGE_PATTERN="^Merge "

          while IFS= read -r msg; do
            if [[ -z "$msg" ]]; then continue; fi
            if [[ "$msg" =~ $MERGE_PATTERN ]]; then continue; fi
            if [[ ! "$msg" =~ $PATTERN ]]; then
              echo "::error::Invalid commit message: '$msg'"
              echo "  Expected format: type(scope): description"
              echo "  Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert, deps"
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::Some commit messages don't follow conventional commits format."
            echo "See: https://www.conventionalcommits.org/"
            exit 1
          fi

          echo "All commit messages follow conventional commits format."
